name: Tests

on:
  pull_request:
    branches: [main, dev, stage]
  push:
    branches: [main, dev, stage, 'ci-test/**']

jobs:
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Run backend tests (with coverage)
        run: make test-cov-xml

      - name: Upload coverage reports
        if: always()
        timeout-minutes: 5
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: EPFL-ENAC/co2-calculator
          flags: backend
          files: ./backend/coverage.xml
          disable_search: true
          fail_ci_if_error: false

  test-backend-migrations:
    name: Backend Migration Smoke (db-create + db-migrate)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      # Spawns its own postgres:16-alpine container (matches existing
      # tests/integration/services/data_ingestion/conftest.py pattern) and
      # exercises the exact commands `make db-create && make db-migrate`
      # runs.  Scoped to a single file so it stays fast on PRs; the daily
      # integration suite picks it up too via the normal tests/integration/
      # discovery.
      - name: Run alembic migration smoke test
        run: uv run pytest tests/integration/test_alembic_migrations.py -vv

  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    # Official Playwright image ships both OS-level dependencies and browser binaries.
    # Keep the image tag in sync with the @playwright/* versions in frontend/package.json.
    container:
      image: mcr.microsoft.com/playwright:v1.61.0-jammy
      # Run as uid 1001 to match the owner of /github/home set by the GitHub Actions
      # runner. Browsers (Firefox in particular) refuse to launch when $HOME is owned
      # by a different user than the process running them.
      options: --user 1001
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: "npm"
          cache-dependency-path: "./frontend/package-lock.json"

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Cache Build Folders
        uses: actions/cache@v4
        with:
          path: |
            ./frontend/dist
            ./frontend/node_modules/.cache
          # The key changes if any source file or dependency changes
          key: ${{ runner.os }}-build-${{ hashFiles('frontend/src/**', 'frontend/package-lock.json', 'frontend/quasar.config.js') }}
          restore-keys: |
            ${{ runner.os }}-build-

      - name: Quasar prepare
        run: npx quasar prepare

      - name: Build frontend
        # Vite is smart: if node_modules/.cache exists, this will be significantly faster
        run: npm run build

      - name: Run frontend tests components
        run: npm run test-ct

      - name: Run frontend tests e2e
        run: npm run test:e2e

      - name: Upload coverage reports
        if: always()
        uses: codecov/codecov-action@v5
        with:
          flags: frontend
          directory: ./frontend
          fail_ci_if_error: false
