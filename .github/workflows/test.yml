name: Tests

on:
  pull_request:
    branches: [main, dev, stage]
  push:
    branches: [main, dev, stage, 'ci-test/**']

jobs:
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Run backend tests (with coverage)
        run: make test-cov-xml

      - name: Upload coverage reports
        if: always()
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: EPFL-ENAC/co2-calculator
          flags: backend
          directory: ./backend
          fail_ci_if_error: false

  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ">=24.0.0"
          cache: "npm"
          cache-dependency-path: "./frontend/package-lock.json"

      - name: Install dependencies
        run: npm ci

      # --- Playwright Caching (from previous step) ---
      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(npx playwright --version | cut -d' ' -f2)" >> $GITHUB_OUTPUT


      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}
      - name: Install Playwright browsers
        run: npx playwright install
        if: steps.playwright-cache.outputs.cache-hit != 'true'
      - name: Install Playwright system dependencies
        run: npx playwright install-deps

      - name: Cache Build Folders
        uses: actions/cache@v4
        with:
          path: |
            ./frontend/dist
            ./frontend/node_modules/.cache
          # The key changes if any source file or dependency changes
          key: ${{ runner.os }}-build-${{ hashFiles('frontend/src/**', 'frontend/package-lock.json', 'frontend/quasar.config.js') }}
          restore-keys: |
            ${{ runner.os }}-build-

      - name: Quasar prepare
        run: npx quasar prepare

      - name: Build frontend
        # Vite is smart: if node_modules/.cache exists, this will be significantly faster
        run: npm run build

      - name: Run frontend tests components
        run: npm run test-ct

      - name: Run frontend tests e2e
        run: npm run test:e2e

      - name: Upload coverage reports
        if: always()
        uses: codecov/codecov-action@v5
        with:
          flags: frontend
          directory: ./frontend
          fail_ci_if_error: false
