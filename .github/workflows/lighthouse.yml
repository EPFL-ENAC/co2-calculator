name: Lighthouse CI


on:
  pull_request:
    branches: [main, dev, stage, 'ci-test/**']
    paths:
      - "frontend/**"
      - ".github/workflows/lighthouse.yml"
      - "frontend/.lighthouserc.ci.json"

jobs:
  lighthouse:
    name: Lighthouse Performance Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: ">=24.0.0"
          cache: "npm"
          cache-dependency-path: "./frontend/package-lock.json"

      - name: Restore frontend build cache
        id: build-cache
        uses: actions/cache@v4
        with:
          path: ./frontend/dist
          key: frontend-build-${{ hashFiles('frontend/src/**', 'frontend/package-lock.json') }}

      - name: Install frontend dependencies
        if: steps.build-cache.outputs.cache-hit != 'true'
        working-directory: ./frontend
        run: npm ci

      - name: install ligthouse
        working-directory: ./frontend
        run: npm install lighthouse --no-save

      - name: Install ecoindex plugin
        run: npm install lighthouse-plugin-ecoindex-core --no-save

      - name: Build frontend
        if: steps.build-cache.outputs.cache-hit != 'true'
        working-directory: ./frontend
        run: npm run build

      - name: Inject Lighthouse bypass flag into index.html
        run: |
          node -e "
            const fs = require('fs');
            const path = './frontend/dist/spa/index.html';
            const html = fs.readFileSync(path, 'utf8');
            fs.writeFileSync(path, html.replace('</head>', '<script>window.__LIGHTHOUSE_BYPASS__=true;</script></head>'));
          "

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v11
        with:
          configPath: "./frontend/.lighthouserc.ci.json"
          uploadArtifacts: true
          temporaryPublicStorage: true

      - name: Comment PR with Lighthouse results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const results = JSON.parse(fs.readFileSync('.lighthouseci/manifest.json'));
            const comment = `## ⚡ Lighthouse CI Results

            📊 [View full report](${results[0].url})

            Performance scores will be available in the artifacts.`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
