name: Lighthouse CI (daily)


on:
  schedule:
    # Every day at 04:00 UTC (offset from integration-tests' 03:30 to avoid pileup)
    - cron: "0 4 * * *"
  workflow_dispatch:
  push:
    branches: ['ci-test/**']

jobs:
  lighthouse:
    name: Lighthouse Performance Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4.4.0
        with:
          cache: "npm"
          node-version-file: '.nvmrc'
          cache-dependency-path: "./frontend/package-lock.json"

      - name: Restore frontend build cache
        id: build-cache
        uses: actions/cache@v4
        with:
          path: ./frontend/dist
          key: frontend-build-${{ hashFiles('frontend/src/**', 'frontend/package-lock.json') }}

      - name: Enable Corepack
        run: corepack enable

      - name: Install frontend dependencies
        if: steps.build-cache.outputs.cache-hit != 'true'
        working-directory: ./frontend
        run: npm ci --ignore-scripts

      - name: install ligthouse
        working-directory: ./frontend
        run: npm install lighthouse --no-save

      - name: Install ecoindex plugin
        run: npm install lighthouse-plugin-ecoindex-core --no-save

      - name: Build frontend
        if: steps.build-cache.outputs.cache-hit != 'true'
        working-directory: ./frontend
        run: npm run build

      - name: Inject Lighthouse bypass flag into index.html
        run: |
          node -e "
            const fs = require('fs');
            const path = './frontend/dist/spa/index.html';
            const html = fs.readFileSync(path, 'utf8');
            fs.writeFileSync(path, html.replace('</head>', '<script>window.__LIGHTHOUSE_BYPASS__=true;</script></head>'));
          "

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v11
        with:
          configPath: "./frontend/.lighthouserc.json"
          uploadArtifacts: true
          temporaryPublicStorage: true
