version: 2
updates:
  # =========================
  # DEV BRANCH (fast updates)
  # =========================

  - package-ecosystem: "uv"
    directory: "/backend"
    schedule:
      interval: "daily"
    target-branch: "dev"
    open-pull-requests-limit: 5
    assignees:
      - "co2-calculator"
    labels:
      - "dependencies"
      - "dev"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "daily"
    target-branch: "dev"
    open-pull-requests-limit: 5
    assignees:
      - "co2-calculator"
    labels:
      - "dependencies"
      - "dev"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
    target-branch: "dev"
    open-pull-requests-limit: 5
    assignees:
      - "co2-calculator"
    labels:
      - "dependencies"
      - "dev"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # =========================
  # MAIN BRANCH (prod safety)
  # =========================

  - package-ecosystem: "uv"
    directory: "/backend"
    schedule:
      interval: "monthly"
    target-branch: "main"
    labels:
      - "dependencies"
      - "production"

  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "monthly"
    target-branch: "main"
    labels:
      - "dependencies"
      - "production"

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
    target-branch: "main"
    labels:
      - "dependencies"
      - "production"
