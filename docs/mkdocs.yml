site_name: EPFL Project Technical Docs
repo_url: https://github.com/epfl-enac/co2-calculator
theme:
  name: material
  language: en
  features:
    - navigation.tabs
    - navigation.sections
    - toc.integrate
    - content.code.annotate
    - navigation.instant
    - navigation.instant.prefetch
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: cyan
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: cyan
# use_directory_urls: true
use_directory_urls: false
watch:
  - src
  - mkdocs.yml
markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - tables
  - attr_list
  - def_list
  - md_in_html
  - footnotes
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tabbed

docs_dir: src
nav:
  - Home: index.md
  - LLM Agent Guide: llm-agent-guide.md
  - Glossary: glossary.md
  - Architecture:
      - Overview: architecture/index.md
      - Purpose & Scope: architecture/01-purpose-scope.md
      - System Overview: architecture/02-system-overview.md
      - Subsystem Map: architecture/03-subsystem-map.md
      - Auth Flow: architecture/04-auth-flow.md
      - Environments: architecture/05-environments.md
      - CI/CD Pipeline: architecture/06-cicd-pipeline.md
      - Global Conventions: architecture/07-global-conventions.md
      - Tech Stack: architecture/08-tech-stack.md
      - Component Breakdown: architecture/09-component-breakdown.md
      - Data Flow: architecture/10-data-flow.md
      - Data Pipeline (Two-Path): architecture/pipeline.md
      - Deployment Topology: architecture/11-deployment-topology.md
      - Scalability: architecture/12-scalability.md
      - Cross-Cutting Concerns: architecture/13-cross-cutting-concerns.md
      - Eco-design: architecture/ecodesign.md
      - Architectural Decisions: architecture/14-architectural-decisions.md
      - Appendices: architecture/15-appendices.md
      - EPFL Compliance: architecture/epfl-compliance-mapping.md
      - Code Standards: architecture/code-standards.md

  - Architecture Decision Records:
      - Overview: architecture-decision-records/index.md
      - ADR-001 Python Package Manager: architecture-decision-records/001-python-package-manager.md
      - ADR-002 Frontend Framework: architecture-decision-records/002-frontend-framework.md
      - ADR-003 Backend Framework: architecture-decision-records/003-backend-framework.md
      - ADR-004 Database Selection: architecture-decision-records/004-database-selection.md
      - ADR-005 Authorization Strategy: architecture-decision-records/005-authorization-strategy.md
      - ADR-010 Background Job Processing: architecture-decision-records/010-background-job-processing.md
      - ADR-011 Factor Classification JSONB: architecture-decision-records/011-factor-classification-jsonb.md
      - ADR-012 JWT Authentication: architecture-decision-records/012-jwt-authentication-strategy.md
      - ADR-013 Object Storage: architecture-decision-records/013-object-storage-strategy.md
      - ADR-014 Security Checklist: architecture-decision-records/014-security-checklist.md
      - ADR-015 Atomic Job Claiming: architecture-decision-records/015-claim-job-atomic-state-is-current.md
      - ADR-016 Two-Path Pipeline: architecture-decision-records/016-pipeline-two-path-principle.md
      - ADR-017 /me Async Role Sync: architecture-decision-records/017-me-endpoint-async-role-sync.md
      - ADR-018 Factor CSV Idempotency: architecture-decision-records/018-factor-csv-delete-before-insert.md

  - Frontend:
      - Overview: frontend/01-overview.md
      - Component Tree: frontend/01-overview/components.md
      - Persona Flows: frontend/01-overview/personas.md
      - Design Tokens: frontend/02-design-tokens.md
      - Data Management:
          - Overview: frontend/data-management/index.md
          - Architecture: frontend/data-management/architecture.md
          - Data Flows: frontend/data-management/data-flows.md
          - Modules & Configuration: frontend/data-management/modules-and-config.md
          - API & Troubleshooting: frontend/data-management/api-and-troubleshooting.md

  - Backend:
      - Overview: backend/01-overview.md
      - Architecture: backend/02-ARCHITECTURE.md
      - File Structure: backend/03-FILE_STRUCTURE.md
      - Quick Start: backend/04-README.md
      - Request Flow: backend/05-REQUEST_FLOW.md
      - Permission System: backend/06-PERMISSION-SYSTEM.md
      - "Developer Guide: Permissions": backend/07-DEVELOPER-GUIDE-PERMISSIONS.md
      - Location Search: backend/09-LOCATION-SEARCH.md
      - CSV seed formats: backend/csv-seed-formats.md

  - Database:
      - Overview: database/01-overview.md

  - Infrastructure:
      - Overview: infra/01-overview.md

  - User Documentation:
      - Overview: user-docs/01-overview.md
extra:
  version: "1.0.0"
extra_css:
  - stylesheets/extra.css
plugins:
  # - search
  # - with-pdf:
  #     author: "EPFL Dev Team"
  #     cover_subtitle: "Technical Documentation"
  #     output_path: pdf/EPFL-Project-Docs.pdf
  #     toc_title: "Table of Contents"
  #     cover: true
  #     ordered_chapter_level: 2
  #     exclude_pages:
  #       - index.md
  #     enabled_if_env: ENABLE_PDF_EXPORT
  #     # custom_styles: styles/pdf-custom.css
  #     verbose: false
  - awesome-pages
  - gen-files:
      scripts:
        - gen_indexes.py
  - literate-nav
  - git-authors:
      # Auto-generated INDEX.md files live in a temp dir from gen-files
      # and have no git history. Don't escalate that to a build error.
      strict: false
      fallback_to_empty: true
  - git-revision-date-localized:
      fallback_to_build_date: true
      locale: en
      timezone: Europe/Zurich
      strict: false
  - minify:
      minify_html: true
      minify_css: true
      minify_js: true

# Auto-generated section indexes are intentionally excluded from `nav:`;
# whitelist them so `mkdocs build --strict` keeps passing.
# Filename `_index.md` (not `INDEX.md`) avoids case-insensitive collisions
# with hand-authored `index.md` pages on macOS/Windows filesystems.
not_in_nav: |
  /architecture/_index.md
  /backend/_index.md
  /frontend/_index.md
  /implementation-plans/_index.md
  /contributing/auto-index.md

