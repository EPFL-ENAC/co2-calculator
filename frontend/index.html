<!doctype html>
<html>
  <head>
    <title><%= productName %></title>

    <meta charset="utf-8" />
    <meta name="description" content="<%= productDescription %>" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="msapplication-tap-highlight" content="no" />
    <meta
      name="viewport"
      content="user-scalable=no, initial-scale=1, maximum-scale=1, minimum-scale=1, width=device-width<% if (ctx.mode.cordova || ctx.mode.capacitor) { %>, viewport-fit=cover<% } %>"
    />

    <link
      rel="icon"
      type="image/png"
      sizes="128x128"
      href="icons/favicon-128x128.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="96x96"
      href="icons/favicon-96x96.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="icons/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="icons/favicon-16x16.png"
    />
    <link rel="icon" type="image/ico" href="favicon.ico" />

    <!--
      Preload branded text fonts. They're otherwise discovered late via the
      CSS @font-face chain (CSS -> @font-face -> fetch), delaying LCP text.
      crossorigin is required: @font-face fetches use CORS mode even
      same-origin, so the preload must match or the browser double-fetches.
    -->
    <link
      rel="preload"
      as="font"
      type="font/woff2"
      href="/fonts/SuisseIntlEPFL-Regular-WebS.woff2"
      crossorigin
    />
    <link
      rel="preload"
      as="font"
      type="font/woff2"
      href="/fonts/SuisseIntlEPFL-Medium-WebS.woff2"
      crossorigin
    />
    <link
      rel="preload"
      as="font"
      type="font/woff2"
      href="/fonts/SuisseIntlEPFL-Bold-WebS.woff2"
      crossorigin
    />

    <!--
      Runtime config. In production this file is overwritten by
      docker/entrypoint.sh on container startup with the per-env values
      (Sentry DSN, environment, etc.). defer (not sync) keeps it off the
      render-blocking path while still running before the app's module
      bundle, so window.injectedEnvVariable is populated before
      src/boot/sentry.ts runs.
    -->
    <script src="/injectEnv.js" defer></script>
  </head>
  <body>
    <!-- quasar:entry-point -->
  </body>
</html>
